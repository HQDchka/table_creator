<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор расписания</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>📅 Генератор расписания</h1>
    
    <div class="card">
        <div class="flex-row">
            <label>Количество групп: </label>
            <input type="number" id="groupCount" min="1" max="5" value="2" style="width: 80px;">
            <button id="applyGroupsBtn">Применить группы</button>
            <button id="saveConfigBtn" class="save-btn">💾 Сохранить</button>
            <button id="loadConfigBtn" class="load-btn">📂 Загрузить</button>
        </div>
        
        <div class="flex-row" style="margin-top: 15px; border-top: 1px solid #334155; padding-top: 15px;">
            <label style="white-space: nowrap;">Рабочие дни недели</label>
            <div id="activeDaysContainer" class="flex-row"></div>
        </div>
    </div>

    <div id="groupsContainer"></div>

    <div class="card">
        <h2 style="margin: 0 0 15px 0; color:#60a5fa;">👨‍🏫 Доступность преподавателей</h2>
        <p style="margin-top:0; font-size:0.9rem; color:#94a3b8;">
            Укажите, в какие дни и на какие пары преподаватель свободен.<br>
            Формат: <strong>1,3,5</strong> или <strong>2-7</strong>
        </p>
        <button id="updateTeachersBtn">🔄 Обновить список преподавателей</button>
        <div id="teachersContainer" style="margin-top:20px;"></div>
    </div>

    <div class="card" style="text-align: center;">
        <button id="generateScheduleBtn" class="generate-btn">🎲 Сгенерировать расписание</button>
        <button id="exportExcelBtn" class="generate-btn export-btn" style="display:none;">📊 Экспортировать в Excel</button>
    </div>

    <div id="scheduleOutput" class="schedule card"></div>
</div>

<script src="script.js"></script>
</script>
</body>
</html>
